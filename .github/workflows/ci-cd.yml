name: Docker Cloud Build Test

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image (In the Cloud)
      run: |
        docker build -t sentiment-service:latest .

    - name: Test the Model
      run: |
        docker run -d -p 5000:5000 --name my-running-app sentiment-service:latest
        sleep 15
        curl http://localhost:5000/